version: '3'

vars:
  VERSION:
    sh: grep "^version =" pyproject.toml | cut -d '"' -f 2
  VCS_REF:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  RNGIT: rngit
  RNGIT_CONFIG: '{{.HOME}}/.rngit'
  RNS_CONFIG: '{{.HOME}}/.reticulum'
  RNGIT_REMOTE:
    sh: git config --get remote.origin.url
  RELEASE_TAG:
    sh: echo v$(poetry version -s 2>/dev/null || grep '^version =' pyproject.toml | cut -d '"' -f 2)
  RELEASE_DIST: dist

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Clean and build sdist and wheel
    deps: [clean]
    cmds:
      - poetry run python3 -m build

  sdist:
    desc: Build source distribution
    cmds:
      - poetry run python3 -m build --sdist

  wheel:
    desc: Build wheel
    cmds:
      - poetry run python3 -m build --wheel

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build dist *.egg-info .pytest_cache

  install:
    desc: Install built wheel
    deps: [build]
    cmds:
      - pip install dist/*.whl

  install-dev:
    desc: Install package in development mode
    cmds:
      - poetry install

  lint:
    desc: Run ruff linter
    cmds:
      - poetry run ruff check .

  format:
    desc: Run ruff with auto-fix
    cmds:
      - poetry run ruff check --fix .

  check:
    desc: Run code quality checks
    deps: [lint]

  test:
    desc: Run local integration tests
    cmds:
      - bash tests/run_tests.sh

  test-advanced:
    desc: Run advanced tests via pytest
    cmds:
      - poetry run pytest tests/test_advanced.py

  run:
    desc: Run rns-page-node locally
    cmds:
      - poetry run python3 -m rns_page_node.main

  run-dev:
    desc: Run rns-page-node with DEBUG logging
    cmds:
      - poetry run python3 -m rns_page_node.main --log-level DEBUG

  version:
    desc: Show current version
    cmds:
      - 'echo "Version: {{.VERSION}}"'

  all:
    desc: Run clean, lint, test, and build
    deps: [clean, check, test, build]

  publish-pypi:
    desc: Publish package to PyPI
    deps: [build]
    cmds:
      - twine upload dist/*

  publish:
    desc: Publish package to PyPI
    deps: [publish-pypi]

  release-dist:
    desc: Build release artifacts in dist/
    deps: [build]

  release-upload:
    desc: Upload dist/ to rngit remote (origin)
    deps: [release-dist]
    cmds:
      - '{{.RNGIT}} release --config {{.RNGIT_CONFIG}} --rnsconfig {{.RNS_CONFIG}} {{.RNGIT_REMOTE}} create {{.RELEASE_TAG}}:{{.RELEASE_DIST}}'

  release:
    desc: Build, tag, push, and upload release via rngit
    deps: [release-upload]
    cmds:
      - git tag -a {{.RELEASE_TAG}} -m "Release {{.RELEASE_TAG}}" 2>/dev/null || true
      - git push origin --follow-tags
